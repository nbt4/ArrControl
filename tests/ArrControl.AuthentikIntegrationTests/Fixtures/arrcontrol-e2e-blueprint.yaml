version: 1
metadata:
  name: ArrControl OIDC integration test realm
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_core.group
    id: arrcontrol-e2e-administrators
    identifiers:
      name: arrcontrol-e2e-admins
    attrs:
      is_superuser: false

  - model: authentik_core.user
    id: arrcontrol-e2e-user
    identifiers:
      username: !Env ARRCONTROL_E2E_USERNAME
    attrs:
      name: ArrControl OIDC Test User
      email: !Env ARRCONTROL_E2E_USER_EMAIL
      is_active: true
      type: internal
      groups:
        - !KeyOf arrcontrol-e2e-administrators
      password: !Env ARRCONTROL_E2E_USER_PASSWORD

  # Authentik deliberately defaults email_verified to false. This isolated realm
  # models a deployment whose administrator has backed the claim with a verified
  # source, which is the only email claim ArrControl may use for account linking.
  - model: authentik_providers_oauth2.scopemapping
    id: arrcontrol-e2e-verified-email
    identifiers:
      managed: arrcontrol.test/providers/oauth2/scope-verified-email
    attrs:
      name: ArrControl test-only verified email mapping
      scope_name: email
      description: Verified email fixture for the isolated ArrControl OIDC test realm
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - model: authentik_providers_oauth2.oauth2provider
    id: arrcontrol-e2e-provider
    identifiers:
      name: arrcontrol-e2e
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: !Env ARRCONTROL_E2E_CLIENT_ID
      client_secret: !Env ARRCONTROL_E2E_CLIENT_SECRET
      grant_types:
        - authorization_code
      include_claims_in_id_token: true
      issuer_mode: per_provider
      sub_mode: hashed_user_id
      redirect_uris:
        - matching_mode: strict
          url: !Env ARRCONTROL_E2E_CALLBACK_URI
          redirect_uri_type: authorization
        - matching_mode: strict
          url: !Env ARRCONTROL_E2E_POST_LOGOUT_URI
          redirect_uri_type: logout
        - matching_mode: strict
          url: !Env ARRCONTROL_E2E_APP_CALLBACK_URI
          redirect_uri_type: authorization
        - matching_mode: strict
          url: !Env ARRCONTROL_E2E_APP_POST_LOGOUT_URI
          redirect_uri_type: logout
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !KeyOf arrcontrol-e2e-verified-email
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]

  - model: authentik_core.application
    identifiers:
      slug: arrcontrol-e2e
    attrs:
      name: ArrControl OIDC integration test
      provider: !KeyOf arrcontrol-e2e-provider
