name: performance

on:
  workflow_dispatch:
  schedule:
    - cron: '41 3 * * 6'

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capacity:
    name: Reference capacity envelope
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore ArrControl.slnx
      - name: Build capacity suite
        run: dotnet build tests/ArrControl.IntegrationTests/ArrControl.IntegrationTests.csproj -c Release --no-restore
      - name: Run capacity envelope
        env:
          ARRCONTROL_RUN_PERFORMANCE_TESTS: '1'
        run: >-
          dotnet test tests/ArrControl.IntegrationTests/ArrControl.IntegrationTests.csproj
          -c Release --no-build
          --filter FullyQualifiedName~PerformanceEnvelopeTests
          --logger "trx;LogFileName=performance.trx"
      - name: Upload measurement result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-result
          path: tests/ArrControl.IntegrationTests/TestResults/performance.trx
          if-no-files-found: error
          retention-days: 30
