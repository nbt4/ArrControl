name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions: { contents: read }
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '9.0.x' }
      - run: dotnet restore ArrControl.slnx
      - run: dotnet build ArrControl.slnx -c Release --no-restore
      - run: dotnet test ArrControl.slnx -c Release --no-build
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
  container:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with: { context: ., file: deploy/Dockerfile, push: false, tags: arrcontrol:test }
