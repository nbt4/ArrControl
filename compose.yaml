services:
  arrcontrol-data-init:
    image: busybox:1.37.0-musl
    container_name: arrcontrol-data-init
    restart: "no"
    user: "0:0"
    network_mode: none
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /data-protection
        chown -R 100:101 /data-protection
        chmod 0700 /data-protection
        find /data-protection -type f -exec chmod 0600 {} +
    volumes:
      - ${ARRCONTROL_DATA_DIR:?Set ARRCONTROL_DATA_DIR in .env}/data-protection:/data-protection

  arrcontrol-db:
    image: postgres:17-alpine
    container_name: arrcontrol-db
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: arrcontrol
      POSTGRES_USER: arrcontrol
      POSTGRES_PASSWORD: ${ARRCONTROL_DB_PASSWORD:?Set ARRCONTROL_DB_PASSWORD in .env}
    volumes:
      - ${ARRCONTROL_DATA_DIR:?Set ARRCONTROL_DATA_DIR in .env}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arrcontrol -d arrcontrol"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [arrcontrol-data]

  arrcontrol:
    image: ${ARRCONTROL_IMAGE:-nobentie/arrcontrol:latest}
    container_name: arrcontrol
    restart: unless-stopped
    depends_on:
      arrcontrol-db:
        condition: service_healthy
      arrcontrol-data-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_URLS: "http://+:${ARRCONTROL_HTTP_PORT:-8080}"
      ConnectionStrings__Database: Host=arrcontrol-db;Port=5432;Database=arrcontrol;Username=arrcontrol;Password=${ARRCONTROL_DB_PASSWORD}
      Bootstrap__AdminEmail: ${ARRCONTROL_ADMIN_EMAIL:?Set ARRCONTROL_ADMIN_EMAIL in .env}
      Bootstrap__AdminPassword: ${ARRCONTROL_ADMIN_PASSWORD:?Set ARRCONTROL_ADMIN_PASSWORD in .env}
      Auth__Oidc__Enabled: "false"
      CredentialEncryption__ActiveKeyVersion: "1"
      CredentialEncryption__Keys__0__Version: "1"
      CredentialEncryption__Keys__0__Path: /run/secrets/arrcontrol_master_key
      App__PublicUrl: ${ARRCONTROL_PUBLIC_URL:?Set ARRCONTROL_PUBLIC_URL in .env}
      DataProtection__KeysPath: /var/lib/arrcontrol/data-protection-keys
    expose: ["${ARRCONTROL_HTTP_PORT:-8080}"]
    volumes:
      - ${ARRCONTROL_DATA_DIR}/data-protection:/var/lib/arrcontrol/data-protection-keys
    secrets: [arrcontrol_master_key]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    networks: [proxy, starr, arrcontrol-data]

networks:
  # Existing Docker networks from the user's reverse proxy and Arr stack.
  proxy:
    external: true
  starr:
    external: true
  arrcontrol-data:
    internal: true

secrets:
  arrcontrol_master_key:
    file: ${ARRCONTROL_MASTER_KEY_FILE:?Set ARRCONTROL_MASTER_KEY_FILE in .env}
